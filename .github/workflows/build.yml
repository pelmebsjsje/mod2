name: Build LiteBuilder mod

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build with Gradle (no local gradlew needed)
        run: gradle build --stacktrace

      - name: Upload built jar(s)
        uses: actions/upload-artifact@v4
        with:
          name: litebuilder-jars
          path: build/libs/*.jar
          if-no-files-found: error
